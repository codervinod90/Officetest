apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-worker
  labels:
    app: agent-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: agent-worker
  template:
    metadata:
      labels:
        app: agent-worker
    spec:
      containers:
      - name: worker
        image: agent-worker:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "2"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        env:
        - name: UVICORN_WORKERS
          value: "1"
        - name: VENV_BASE
          value: "/venvs"
        - name: MCP_SERVER_URL
          value: "http://mcp-server:8002"
        # Docker Desktop (Windows): PVC /venvs often breaks mmap on .so (pydantic_core).
        # Copy venv to emptyDir before execute. Remove this var on Linux cloud if unused.
        - name: WORKER_VENV_SCRATCH
          value: "/venv-scratch"
        envFrom:
        - secretRef:
            name: llm-api-keys
        volumeMounts:
        - name: venv-cache
          mountPath: /venvs
          readOnly: true
        - name: venv-scratch
          mountPath: /venv-scratch
      volumes:
      - name: venv-cache
        persistentVolumeClaim:
          claimName: venv-cache
      - name: venv-scratch
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: agent-worker
spec:
  selector:
    app: agent-worker
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-worker-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-worker
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Pods
        value: 4
        periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300