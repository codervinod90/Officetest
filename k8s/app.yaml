apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-app
  labels:
    app: agent-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-app
  template:
    metadata:
      labels:
        app: agent-app
    spec:
      containers:
      - name: app
        image: agent-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8501
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        env:
        - name: WORKER_URL
          value: "http://agent-worker:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: agent-app
spec:
  selector:
    app: agent-app
  ports:
  - port: 8501
    targetPort: 8501
    nodePort: 30501
  type: NodePort
