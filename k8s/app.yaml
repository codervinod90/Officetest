apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-app
  labels:
    app: agent-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-app
  template:
    metadata:
      labels:
        app: agent-app
    spec:
      initContainers:
      - name: seed-agents
        image: agent-app:latest
        imagePullPolicy: Never
        command: ["sh", "-c"]
        args:
        - |
          set -e
          mkdir -p /agents
          for src in /app/artifacts/*/; do
            [ -d "$src" ] || continue
            name=$(basename "$src")
            [ "$name" = "tools" ] && continue
            mkdir -p "/agents/$name"
            cp -rf "${src}/." "/agents/$name/"
          done
        volumeMounts:
        - name: agents-vol
          mountPath: /agents
      containers:
      - name: app
        image: agent-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8501
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        envFrom:
        - secretRef:
            name: llm-api-keys
        env:
        - name: WORKER_URL
          value: "http://agent-worker:8000"
        - name: VENV_BUILDER_URL
          value: "http://venv-builder:8001"
        - name: MCP_SERVER_URL
          value: "http://mcp-server:8002"
        - name: TOOLS_DIR
          value: "/tools"
        - name: ARTIFACTS_DIR
          value: "/agents"
        volumeMounts:
        - name: tools-vol
          mountPath: /tools
        - name: agents-vol
          mountPath: /agents
      volumes:
      - name: tools-vol
        persistentVolumeClaim:
          claimName: tools-cache
      - name: agents-vol
        persistentVolumeClaim:
          claimName: agents-cache
---
apiVersion: v1
kind: Service
metadata:
  name: agent-app
spec:
  selector:
    app: agent-app
  ports:
  - port: 8501
    targetPort: 8501
    nodePort: 30501
  type: NodePort
